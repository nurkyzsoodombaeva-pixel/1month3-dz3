<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark">
    <div class="app">
      <header>
        <h1>Todo List</h1>
        <button id="theme-toggle" title="Сменить тему">🌙</button>
      </header>

      <div class="controls">
        <input type="text" id="search" placeholder="Поиск задач..." />
        <form id="todo-form">
          <input
            type="text"
            id="todo-input"
            placeholder="Новая задача..."
            required
          />
          <button type="submit">Добавить</button>
        </form>
        <div class="filters">
          <button data-something="value" data-filter="all" class="active">
            Все
          </button>
          <button data-filter="active">Активные</button>
          <button data-filter="completed">Выполненные</button>
        </div>
      </div>

      <ul id="todo-list">
        <li class="task">
          <input type="checkbox" />
          <span>name</span>
          <button class="del">x</button>
        </li>
      </ul>
    </div>

    <script src="main.js"></script>
  </body>
</html>
